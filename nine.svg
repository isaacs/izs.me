<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1400" height="1600" viewBox="0 0 1400 1600" style="enable-background:new 0 0 600 600; background-color: #E5CFCB">

<!--

x=400,y=400,r=300
xn = n => x - r * Math.sin(n * 2 * Math.PI / 9)
yn = n => y - r * Math.cos(n * 2 * Math.PI / 9)
xy = n => [xn(n), yn(n)]
points = []
for (i = 0; i < 9; i++) points[i] = xy(i)

paths = []

colors = [
  '1 0 0', // red
  '1 0.5 0', // orange
  '1 1 0', // yellow
  '0.5 1 0', // lime
  '0 0.5 0', // green
  '0 1 1', // cyan
  '0 0 1', // blue
  '0.5 0 1', //violet
  '1 0 1', // magenta
]

for (i = 0; i < 9; i++) {
  to = (i + 2) % 9
  c = colors[i]
  paths.push(`<path d="M ${points[i].join(',')} L ${points[to].join(',')} Z" stroke="color(rec2020 ${c})" stroke-width="4"/>`)
}

console.log(paths.join('\n'))
-->

